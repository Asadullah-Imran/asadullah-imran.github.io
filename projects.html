  <body class="font-sans bg-light text-dark antialiased">
    <div id="navbar-include"></div>

    <main class="pt-24 pb-12">
      <!-- Projects Section -->
      <section
        id="projects-animate"
        class="container mx-auto px-6 opacity-0 translate-y-8 transition-all duration-1000"
      >
        <h1

        <!-- Project Filters -->

          <button
            class="filter-btn px-4 py-2 rounded-full bg-primary text-white"
            data-filter="all"
          >
            All

          <button
            class="filter-btn px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition"
            data-filter="web"
          >
            Web
          </button>
          <button
            class="filter-btn px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition"
            data-filter="academic"
          >
            Academic
          </button>
        </div>

        <!-- Projects Grid -->
        <div
          id="projects-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
        >
          <!-- Projects will be loaded dynamically by projects.js -->
        </div>
      </section>
    </main>

    <div id="footer-include"></div>
    <script>
      // Footer include
      document.addEventListener("DOMContentLoaded", function () {
        fetch("assets/components/footer.html")
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("footer-include").innerHTML = data;
          });
      });
    </script>

    <!-- Scripts -->
    <script src="assets/js/projects.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script>
      // Projects fade-in animation
      window.addEventListener("DOMContentLoaded", () => {
        const projects = document.getElementById("projects-animate");
        if (projects) {
          setTimeout(() => {
            projects.classList.remove("opacity-0", "translate-y-8");
            projects.classList.add("opacity-100", "translate-y-0");
          }, 100);
        }
      });
    </script>
    <script>
      // Simple animation on scroll
      document.addEventListener("DOMContentLoaded", function () {
        const animatedItems = document.querySelectorAll(".animate-fadeIn");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.style.animationPlayState = "running";
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1 }
        );
        animatedItems.forEach((item) => {
          item.style.animationPlayState = "paused";
          observer.observe(item);
        });
      });
    </script>
  </body>
