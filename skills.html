<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills | Asadullah Imran</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4e54c8",
              "primary-light": "#6a6fd8",
              "primary-dark": "#3a3f9e",
              secondary: "#8f94fb",
              "secondary-dark": "#777df9",
              "secondary-light": "#a7abfc",
              accent: "#00b4d8",
              "accent-dark": "#0093b0",
              "accent-light": "#00d9ff",
              dark: "#1e1e2d",
              light: "#f8f9fa",
              white: "#ffffff",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
          },
        },
      };
    </script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>

  <body class="font-sans bg-light text-dark antialiased">
    <div id="navbar-include"></div>

    <main class="pt-24 pb-12">
      <!-- Skills Section -->
      <section
        id="skills-animate"
        class="container mx-auto px-6 opacity-0 translate-y-8 transition-all duration-1000"
      >
        <h1
          class="text-3xl md:text-4xl font-bold text-center mb-12 text-primary"
        >
          My Skills
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
          <!-- Programming Skills -->
          <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex items-center mb-6">
              <div
                class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mr-4"
              >
                <i class="fas fa-code text-primary text-xl"></i>
              </div>
              <h2 class="text-2xl font-bold">Programming</h2>
            </div>
            <div id="programming-skills" class="space-y-4"></div>
          </div>

          <!-- Web Skills -->
          <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex items-center mb-6">
              <div
                class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mr-4"
              >
                <i class="fas fa-globe text-primary text-xl"></i>
              </div>
              <h2 class="text-2xl font-bold">Web Technologies</h2>
            </div>
            <div id="web-skills" class="space-y-4"></div>
          </div>

          <!-- Tools Skills -->
          <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex items-center mb-6">
              <div
                class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mr-4"
              >
                <i class="fas fa-tools text-primary text-xl"></i>
              </div>
              <h2 class="text-2xl font-bold">Tools</h2>
            </div>
            <div id="tools-skills" class="flex flex-wrap gap-3"></div>
          </div>

          <!-- Concepts Skills -->
          <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex items-center mb-6">
              <div
                class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mr-4"
              >
                <i class="fas fa-lightbulb text-primary text-xl"></i>
              </div>
              <h2 class="text-2xl font-bold">Concepts</h2>
            </div>
            <div
              id="concepts-skills"
              class="grid grid-cols-1 md:grid-cols-2 gap-3"
            ></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-8">
      <div class="container mx-auto px-6 text-center">
        <p>&copy; 2024 Asadullah Imran. All rights reserved.</p>
        <div class="flex justify-center space-x-6 mt-4">
          <a href="#" class="hover:text-primary transition"
            ><i class="fab fa-github text-xl"></i
          ></a>
          <a href="#" class="hover:text-primary transition"
            ><i class="fab fa-linkedin text-xl"></i
          ></a>
          <a href="#" class="hover:text-primary transition"
            ><i class="fab fa-leetcode text-xl"></i
          ></a>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/skills.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script>
      // Skills fade-in animation
      window.addEventListener("DOMContentLoaded", () => {
        const skills = document.getElementById("skills-animate");
        if (skills) {
          setTimeout(() => {
            skills.classList.remove("opacity-0", "translate-y-8");
            skills.classList.add("opacity-100", "translate-y-0");
          }, 100);
        }
      });
    </script>
  </body>
</html>
