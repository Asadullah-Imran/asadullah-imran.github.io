    />

    <meta name="twitter:card" content="summary_large_image" />

    />

    <meta name="robots" content="index, follow" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4e54c8",
              "primary-light": "#6a6fd8",
              "primary-dark": "#3a3f9e",
              secondary: "#8f94fb",
              "secondary-dark": "#777df9",
              "secondary-light": "#a7abfc",
              accent: "#00b4d8",
              "accent-dark": "#0093b0",
              "accent-light": "#00d9ff",
              dark: "#1e1e2d",
              light: "#f8f9fa",
              white: "#ffffff",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
          },
        },
      };
    </script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="font-sans bg-light text-dark antialiased">
    <div id="navbar-include"></div>
    <main class="pt-24 pb-12">
      <section
        id="blog-animate"
        class="container mx-auto px-6 py-12 bg-white rounded-lg shadow-md opacity-0 translate-y-8 transition-all duration-1000"
      >
        <h1
          class="text-3xl md:text-4xl font-bold text-primary text-center mb-12"
        >
          Blog
        </h1>
        <div
          id="blog-list"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
        >
          <!-- Blog posts will be loaded here by blog.js -->
        </div>
      </section>
    </main>
    <div id="footer-include"></div>
    <!-- Scripts -->
    <script src="assets/js/blog.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script>
      // Footer include
      document.addEventListener("DOMContentLoaded", function () {
        fetch("assets/components/footer.html")
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("footer-include").innerHTML = data;
          });
      });
      // Blog fade-in animation
      window.addEventListener("DOMContentLoaded", () => {
        const blog = document.getElementById("blog-animate");
        if (blog) {
          setTimeout(() => {
            blog.classList.remove("opacity-0", "translate-y-8");
            blog.classList.add("opacity-100", "translate-y-0");
          }, 100);
        }
      });
    </script>
  </body>
</html>
