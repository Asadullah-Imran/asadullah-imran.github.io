    <script>
      // Project detail fade-in animation
      window.addEventListener("DOMContentLoaded", () => {
        const projectDetail = document.getElementById("project-detail-animate");
        if (projectDetail) {
          setTimeout(() => {
            projectDetail.classList.remove("opacity-0", "translate-y-8");
            projectDetail.classList.add("opacity-100", "translate-y-0");
          }, 100);
        }
      });
    </script>
    <script>
      // Simple animation on scroll
      document.addEventListener("DOMContentLoaded", function () {
        const animatedItems = document.querySelectorAll(".animate-fadeIn");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.style.animationPlayState = "running";
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1 }
        );
        animatedItems.forEach((item) => {
          item.style.animationPlayState = "paused";
          observer.observe(item);
        });
      });
    </script>
