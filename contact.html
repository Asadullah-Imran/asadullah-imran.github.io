<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4e54c8",
              "primary-light": "#6a6fd8",
              "primary-dark": "#3a3f9e",
              secondary: "#8f94fb",
              "secondary-dark": "#777df9",
              "secondary-light": "#a7abfc",
              accent: "#00b4d8",
              "accent-dark": "#0093b0",
              "accent-light": "#00d9ff",
              dark: "#1e1e2d",
              light: "#f8f9fa",
              white: "#ffffff",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
          },
        },
      };
    </script>
    <!-- Font Awesome -->
    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="font-sans bg-light text-dark antialiased">
    <div id="navbar-include"></div>
    <main class="pt-24 pb-12">
      <section id="contact" class="py-20 bg-primary text-white">
        <div class="container mx-auto px-6">
          <h2 class="text-3xl font-bold text-center mb-12">Get In Touch</h2>
          <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <p class="mb-2">
                <i class="fas fa-envelope mr-2"></i>
                <a
                  href="mailto:asadullahimran19@gmail.com"
                  class="hover:underline"
                  >asadullahimran19@gmail.com</a
                >
              </p>
              <p>
                <i class="fas fa-phone mr-2"></i>
                <a href="tel:+8801633356249" class="hover:underline"
                  >+8801633-356249</a
                >
              </p>
              <div id="social-links" class="flex space-x-4 mt-4">
                <!-- Dynamic social links -->
              </div>
            </div>
            <form class="space-y-4">
              <input
                type="text"
                placeholder="Name"
                class="w-full px-4 py-2 rounded bg-primary-light border border-primary-dark text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-accent"
              />
              <input
                type="email"
                placeholder="Email"
                class="w-full px-4 py-2 rounded bg-primary-light border border-primary-dark text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-accent"
              />
              <textarea
                rows="4"
                placeholder="Message"
                class="w-full px-4 py-2 rounded bg-primary-light border border-primary-dark text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-accent"
              ></textarea>
              <button
                type="submit"
                class="bg-accent hover:bg-accent-dark text-white px-6 py-3 rounded-lg font-medium transition w-full"
              >
                Send Message
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <footer class="bg-dark text-white py-8 text-center">
      <p>&copy; 2024 Asadullah Imran. All rights reserved.</p>
      <div class="flex justify-center space-x-6 mt-4">
        <a href="#" class="hover:text-primary transition"

        ></a>
